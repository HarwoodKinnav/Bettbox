name: build

on:
  push:
    branches:
      - 'Translation-TEST'
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/build.yaml'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: false
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Keystore (Android)
        run: |
          # Генерируем тестовый keystore если secrets не доступны
          if [ -z "${{ secrets.KEYSTORE }}" ]; then
            echo "Generating test keystore for Android..."
            keytool -genkey -v -keystore android/app/keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias test_key -storepass 123456 -keypass 123456 \
              -dname "CN=test, OU=test, O=test, L=test, ST=test, C=US"
            echo "keyAlias=test_key" >> android/local.properties
            echo "storePassword=123456" >> android/local.properties
            echo "keyPassword=123456" >> android/local.properties
            echo "✓ Test keystore generated"
          else
            echo "Using secret keystore..."
            echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
            echo "✓ Secret keystore loaded"
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-android-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: '3.44.0'

      - name: Clean Gradle (Android)
        run: |
          cd android
          flutter clean

      - name: Build Bettbox
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart android --arch ${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-android-${{ matrix.arch }}-${{ github.run_number }}
          path: ./dist
          compression-level: 9
          overwrite: true
          retention-days: 5

      - name: Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build ${{ matrix.arch }} completed successfully"
          else
            echo "❌ Build ${{ matrix.arch }} failed"
          fi
