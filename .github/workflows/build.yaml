name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: ${{ !contains(github.ref, '-') || contains(github.ref_name, 'pre') }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-24.04
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Keystore (Android)
        if: matrix.platform == 'android'
        run: |
          # Генерируем тестовый keystore если secrets не доступны
          if [ -z "${{ secrets.KEYSTORE }}" ]; then
            echo "Generating test keystore for Android..."
            keytool -genkey -v -keystore android/app/keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias test_key -storepass 123456 -keypass 123456 \
              -dname "CN=test, OU=test, O=test, L=test, ST=test, C=US"
            echo "keyAlias=test_key" >> android/local.properties
            echo "storePassword=123456" >> android/local.properties
            echo "keyPassword=123456" >> android/local.properties
            echo "✓ Test keystore generated"
          else
            echo "Using secret keystore..."
            echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
            echo "✓ Secret keystore loaded"
          fi

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: '3.44.0'

      - name: Clean Gradle (Android)
        if: matrix.platform == 'android'
        run: |
          cd android
          flutter clean

      - name: Build Bettbox
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v7
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo "- Android test build with scrollbar fixes" > release.md

      - name: Release
        if: ${{ env.SHOULD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}